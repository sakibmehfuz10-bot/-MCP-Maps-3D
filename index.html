<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MCP Maps 3D - Interactive 3D mapping application powered by Google Maps and Gemini AI" />
    <meta name="theme-color" content="#000000" />
    <title>MCP Maps 3D</title>
    <link rel="stylesheet" href="/index.css">
    <style>
      /* Prevent FOUC (Flash of Unstyled Content) */
      body {
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }
      body.app-loaded {
        visibility: visible;
        opacity: 1;
      }
      
      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      
      /* Error screen */
      #error-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        padding: 20px;
      }
      
      .error-content {
        text-align: center;
        max-width: 500px;
      }
      
      .error-icon {
        font-size: 60px;
        margin-bottom: 20px;
      }
      
      .error-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      
      .error-message {
        font-size: 14px;
        color: #ccc;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      
      .error-details {
        background: rgba(0, 0, 0, 0.3);
        padding: 15px;
        border-radius: 8px;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        text-align: left;
        margin-bottom: 20px;
        max-height: 150px;
        overflow-y: auto;
        color: #ff6b6b;
      }
      
      .error-button {
        background: #4285F4;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }
      
      .error-button:hover {
        background: #3367D6;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Initializing MCP Maps 3D...</div>
    </div>
    
    <!-- Error screen -->
    <div id="error-screen">
      <div class="error-content">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Application Error</div>
        <div class="error-message">
          An error occurred while initializing the application. Please check the details below and try again.
        </div>
        <div class="error-details" id="error-details"></div>
        <button class="error-button" onclick="location.reload()">Reload Page</button>
      </div>
    </div>
    
    <!-- Main application root -->
    <div id="root"></div>
    
    <!-- Application entry point -->
    <script type="module" src="/index.tsx"></script>
    
    <!-- Global error handler -->
    <script>
      window.addEventListener('error', (event) => {
        console.error('Global error:', event.error);
        showError('JavaScript Error', event.error?.message || 'An unexpected error occurred');
      });
      
      window.addEventListener('unhandledrejection', (event) => {
        console.error('Unhandled promise rejection:', event.reason);
        showError('Promise Rejection', event.reason?.message || 'An unexpected error occurred');
      });
      
      function showError(title, message) {
        const loadingScreen = document.getElementById('loading-screen');
        const errorScreen = document.getElementById('error-screen');
        const errorDetails = document.getElementById('error-details');
        
        if (loadingScreen) loadingScreen.style.display = 'none';
        if (errorScreen) {
          errorScreen.style.display = 'flex';
          errorScreen.querySelector('.error-title').textContent = title;
          if (errorDetails) {
            errorDetails.textContent = message;
          }
        }
      }
      
      // Mark app as loaded after a short delay
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          const root = document.getElementById('root');
          if (loadingScreen && root && root.children.length > 0) {
            loadingScreen.style.display = 'none';
            document.body.classList.add('app-loaded');
          }
        }, 500);
      });
    </script>
  </body>
</html>
